<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>몽키해드의 MWO 멕랩</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div>
          <h1>몽키해드의 MWO 멕랩</h1>
          <p id="data-status">Loading local data...</p>
        </div>
        <div class="summary-strip" id="summary-strip"></div>
        <a class="donate-link" href="https://ko-fi.com/killkimno" target="_blank" rel="noopener noreferrer" aria-label="Ko-fi 후원 페이지 열기">후원하기</a>
      </header>

      <nav class="main-tabs" aria-label="Main tabs">
        <button class="tab-button" type="button" data-main-tab="mechlab" aria-controls="tab-mechlab" disabled aria-disabled="true">현재 멕랩</button>
        <button class="tab-button active" type="button" data-main-tab="info" aria-controls="tab-info">정보</button>
        <button class="tab-button" type="button" data-main-tab="compare" aria-controls="tab-compare">비교하기</button>
        <button class="tab-button" type="button" data-main-tab="stats" aria-controls="tab-stats">통계</button>
      </nav>

      <main class="app-main">
        <div id="mech-browser-layout" class="mech-browser-layout">
          <aside class="sidebar">
            <div class="toolbar">
              <div class="mech-toolbar-row">
                <input id="mech-search" type="search" placeholder="Search chassis or variant">
                <button id="mech-list-view-toggle" class="mech-list-view-toggle" type="button" aria-pressed="true" title="작은 리스트 보기"><<</button>
              </div>
              <select id="faction-filter">
                <option value="">All factions</option>
                <option value="InnerSphere">Inner Sphere</option>
                <option value="Clan">Clan</option>
              </select>
              <select id="weight-filter">
                <option value="">All weight classes</option>
                <option value="light">라이트</option>
                <option value="medium">미듐</option>
                <option value="heavy">해비</option>
                <option value="assault">어썰트</option>
              </select>
              <select id="mech-sort">
                <option value="default">기본 정렬</option>
                <option value="tons">톤수 정렬</option>
              </select>
            </div>
            <div id="mech-list" class="mech-list"></div>
          </aside>

          <div class="tab-content">
            <section id="tab-mechlab" class="tab-panel" hidden>
              <div class="workspace">
                <section class="variant-panel">
                  <div>
                    <h2 id="variant-name">No mech selected</h2>
                    <div id="variant-meta" class="muted"></div>
                  </div>
                  <div class="actions">
                    <button id="reset-stock" type="button">Stock</button>
                    <button id="save-build" type="button">Save</button>
                    <button id="clear-build" type="button">Clear</button>
                  </div>
                </section>

                <section class="quirks-panel">
                  <div class="section-title-row">
                    <h3>QUIRKS</h3>
                    <span id="quirk-count" class="muted"></span>
                  </div>
                  <div id="quirks" class="quirks"></div>
                </section>

                <section class="mechlab-grid">
                  <div class="components-panel">
                    <h3>Components</h3>
                    <div id="components" class="components"></div>
                  </div>

                  <div class="equipment-panel">
                    <h3>Equipment</h3>
                    <div class="toolbar equipment-toolbar">
                      <input id="item-search" type="search" placeholder="Search equipment">
                      <select id="item-family">
                        <option value="">All equipment</option>
                        <option value="weapons">Weapons</option>
                        <option value="ammo">Ammo</option>
                        <option value="engines">Engines</option>
                        <option value="equipment">Equipment</option>
                        <option value="jumpjets">Jump jets</option>
                        <option value="masc">MASC</option>
                        <option value="weapon_mods">Weapon mods</option>
                      </select>
                    </div>
                    <div id="selected-item" class="selected-item muted">No item selected</div>
                    <div id="item-list" class="item-list"></div>
                  </div>
                </section>
              </div>
            </section>

            <section id="tab-info" class="tab-panel info-workspace active">
              <section class="variant-panel">
                <div>
                  <h2 id="info-variant-name">No mech selected</h2>
                  <div id="info-variant-meta" class="muted"></div>
                </div>
                <div class="info-actions">
                  <label class="toggle-row">
                    <input id="info-apply-quirks" type="checkbox" checked>
                    <span>쿼크 적용</span>
                  </label>
                </div>
              </section>
              <div id="mech-info" class="info-grid"></div>
            </section>

            <section id="tab-compare" class="tab-panel info-workspace" hidden>
              <section class="variant-panel">
                <div>
                  <h2 id="compare-variant-name">멕 비교</h2>
                  <div id="compare-variant-meta" class="muted"></div>
                </div>
                <div class="info-actions">
                  <button id="compare-clear-compare" class="info-clear-compare" type="button">비교 리스트 모두 지우기</button>
                  <label class="toggle-row">
                    <input id="compare-deltas" type="checkbox" checked>
                    <span>차이 표시</span>
                  </label>
                  <label class="toggle-row">
                    <input id="compare-apply-quirks" type="checkbox" checked>
                    <span>쿼크 적용</span>
                  </label>
                </div>
              </section>
              <div id="compare-info" class="compare-grid"></div>
            </section>
          </div>
        </div>

        <section id="tab-stats" class="tab-panel stats-panel" hidden>
          <div class="stats-toolbar" aria-label="통계 종류">
            <button class="stats-button active" type="button" data-stats-view="durability">내구도</button>
          </div>
          <section class="stats-workspace" aria-labelledby="stats-title">
            <div class="stats-heading">
              <div>
                <h2 id="stats-title">멕 리스트 통계</h2>
                <div id="stats-meta" class="muted"></div>
              </div>
            </div>
            <div id="stats-list" class="stats-list"></div>
          </section>
        </section>
      </main>
    </div>

    <div id="compare-overlay" class="compare-header-overlay" hidden>
      <div id="compare-overlay-cells" class="compare-header-overlay-cells"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
